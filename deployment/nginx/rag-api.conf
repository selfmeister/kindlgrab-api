# Nginx configuration for RAG API
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled/

upstream rag_api {
    server 127.0.0.1:8000;
}

# Redirect all HTTP traffic to HTTPS.
server {
    listen 80;
    server_name rag.elicitiq.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rag.elicitiq.com;

    ssl_certificate /etc/letsencrypt/live/rag.elicitiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rag.elicitiq.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Internal health check endpoint (not public).
    location = /health {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://rag_api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # Public API surface: only /search is exposed.
    location = /search {
        limit_except POST OPTIONS { deny all; }
        proxy_pass http://rag_api/search;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Block everything else.
    location / {
        return 404;
    }
}
